<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="なつやすみのタスクをクリアしてキャラクターをそだてよう！こども向けの夏休みタスク管理ゲーム">
<meta property="og:title" content="🌻 ナツヤスミン - なつやすみ そだてバトル">
<meta property="og:description" content="毎日のタスクや宿題をクリアすると、たまごから生まれたキャラがまさかの進化！おひるね好きのライバル「なつお」と競争しながら夏休みを楽しく過ごそう。">
<meta property="og:type" content="website">
<title>🌻 ナツヤスミン 🌻</title>
<!-- ときくんスペシャルバージョン（データは公開版と完全に別・計測なし） -->
<style>
:root{
  --red:#ff6b81; --yellow:#ffd93d; --blue:#5f7cff; --orange:#ff9f43;
  --cyan:#4dd0e1; --purple:#9c6ade; --pink:#ff8fab; --green:#7bc86c;
  --ink:#3b3b4f; --card:#ffffff;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation;}
input{user-select:text; -webkit-user-select:text;}
html,body{margin:0;padding:0;}
body{
  font-family:"M PLUS Rounded 1c","Hiragino Maru Gothic ProN","Yu Gothic UI","Meiryo",sans-serif;
  color:var(--ink);
  background:linear-gradient(160deg,#bfe9ff 0%,#d8f4e3 45%,#fdf3d8 100%);
  min-height:100vh;
  user-select:none;
}
/* ===== ヘッダー ===== */
.hero{
  background:linear-gradient(120deg,#3fb9e8,#3ec9a7);
  text-align:center; padding:18px 10px 20px; position:relative;
  box-shadow:0 4px 18px rgba(60,140,160,.25);
}
.hero h1{
  margin:0; color:#fff; font-size:44px; letter-spacing:8px;
  text-shadow:0 3px 0 rgba(0,90,120,.25);
  animation:titleBounce 3s ease-in-out infinite;
}
.hero p{margin:6px 0 0; color:#eafcff; font-size:15px; letter-spacing:3px;}
@keyframes titleBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.icon-btn{
  position:absolute; top:14px; right:16px; font-size:22px; border:none;
  background:rgba(255,255,255,.3); border-radius:50%; width:46px; height:46px;
  cursor:pointer; transition:transform .15s;
}
.icon-btn:active{transform:scale(.85);}
.wrap{max-width:1180px; margin:0 auto; padding:16px;}
/* ===== カード ===== */
.card{
  background:var(--card); border-radius:22px; padding:18px 20px; margin-bottom:16px;
  box-shadow:0 6px 20px rgba(90,120,150,.12);
}
.card h2{
  margin:0 0 4px; font-size:19px;
  border-bottom:3px dashed #cfe6ef; padding-bottom:10px;
}
/* ===== カレンダー ===== */
.cal-head{display:flex; justify-content:space-between; align-items:center; font-weight:700; font-size:17px;}
.cal-head #todayLabel{color:#2a9dd6;}
.cal-strip{display:flex; gap:4px; overflow-x:auto; padding:12px 2px 6px; scrollbar-width:thin; -webkit-overflow-scrolling:touch;}
.day{min-width:34px; text-align:center; flex-shrink:0;}
.day .num{font-size:13px; font-weight:700; color:#9aa7b0;}
.day .box{
  width:32px; height:30px; background:#eef2f5; border-radius:8px; margin:3px auto;
  display:flex; align-items:center; justify-content:center; font-size:18px;
  transition:transform .2s;
}
.day .wd{font-size:11px; color:#9aa7b0;}
.day.sat .num,.day.sat .wd{color:#4aa3ff;}
.day.sun .num,.day.sun .wd{color:#ff6b6b;}
.day.today .box{background:#ffe9a8; box-shadow:0 0 0 3px #ffd257; animation:pulseBox 1.6s infinite;}
.day.stamped .box{background:#e8f8dc;}
@keyframes pulseBox{0%,100%{box-shadow:0 0 0 3px #ffd257}50%{box-shadow:0 0 0 6px #ffd25755}}
.cal-count{text-align:center; font-weight:700; color:#8b95a0; padding-top:4px;}
.cal-count b{color:#ff5b5b; font-size:18px;}
/* ===== 2カラム ===== */
.cols{display:flex; gap:16px; align-items:flex-start;}
.col-left{width:360px; flex-shrink:0;}
.col-right{flex:1; min-width:0;}
/* タブレット・よこ向きスマホ：2カラムを維持して左をスリムに */
@media(max-width:1000px) and (min-width:701px){
  .col-left{width:300px;}
  .task-btn{min-width:82px; padding:9px 14px; font-size:14px;}
}
/* たて向きスマホ：縦積み */
@media(max-width:700px){
  .cols{flex-direction:column}
  .col-left{width:100%}
  .hero h1{font-size:30px; letter-spacing:4px;}
  .hero p{font-size:12px; letter-spacing:2px;}
  .wrap{padding:10px;}
  .card{padding:14px; border-radius:18px; margin-bottom:12px;}
  .bar-label{width:104px; font-size:13px;}
  .bar-val{width:64px; font-size:11px;}
  .task-name{font-size:15.5px;}
  .task-emoji{font-size:26px; width:34px;}
}
/* よこ向きスマホなど、たかさが低い画面：ポップアップを小さく */
@media(max-height:560px){
  .hero{padding:8px 10px 10px;}
  .hero h1{font-size:24px; letter-spacing:3px; animation:none;}
  .hero p{display:none;}
  .icon-btn{width:38px; height:38px; font-size:17px; top:7px;}
  .panel{padding:12px 14px;}
  .panel h2{font-size:19px; margin:2px 0 6px; padding-bottom:4px;}
  .panel .desc{font-size:13px; margin-bottom:6px; line-height:1.5;}
  .big-btn{font-size:18px; padding:12px 36px; margin-top:8px; letter-spacing:2px;}
  .stage-box{height:min(300px,56vh);}
  .evo-stage{height:min(250px,52vh);}
  #evoSvg{height:min(220px,44vh); width:auto;}
  .evo-name{font-size:21px; margin-top:6px;}
  .countdown{font-size:64px;}
  .battle-hud{font-size:15px; margin-top:6px;}
}
/* ===== タスク行 ===== */
.task-row{
  display:flex; align-items:center; gap:12px; padding:13px 4px;
  border-bottom:1px solid #f0f4f7;
}
.task-row:last-child{border-bottom:none;}
.task-emoji{font-size:30px; width:40px; text-align:center; filter:drop-shadow(0 2px 2px rgba(0,0,0,.12));}
.task-info{flex:1;}
.task-name{font-weight:800; font-size:17px;}
.task-sub{font-size:12.5px; color:#9aa7b0; margin-top:2px;}
.task-btn{
  border:none; color:#fff; font-weight:800; font-size:15px; font-family:inherit;
  padding:10px 20px; border-radius:999px; cursor:pointer; min-width:96px;
  box-shadow:0 4px 0 rgba(0,0,0,.14);
  transition:transform .1s, box-shadow .1s, filter .2s;
}
.task-btn:active{transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.14);}
.task-btn.done{filter:grayscale(.55) brightness(1.08); box-shadow:none; cursor:default; transform:none;}
.task-row.finished .task-name{color:#b6c2cb;}
/* 宿題の完了は ひとめでわかる緑ハイライト */
.task-row.hw-done{
  background:linear-gradient(90deg,#e8f8dc,#f6fff0);
  border-radius:16px; border-bottom:none; margin:4px -6px; padding:13px 10px;
}
.task-row.hw-done .task-name{color:#4caf50; font-weight:900;}
.task-btn.done-strong{
  background:#4caf50 !important; filter:none; box-shadow:none;
  cursor:default; transform:none; font-size:13.5px;
}
.hint{font-size:13.5px; line-height:1.9; color:#5d6b78; background:linear-gradient(140deg,#f2fbf3,#fdf6ec);}
.hint b{color:#ff8a3d;}
.hint .k1{color:#3ec06e; font-weight:800;} .hint .k2{color:#4aa3ff; font-weight:800;} .hint .k3{color:#e2574c; font-weight:800;}
/* ===== ステータス ===== */
.bar-row{display:flex; align-items:center; gap:10px; margin:7px 0;}
.bar-label{width:150px; font-weight:800; font-size:15px; display:flex; align-items:center; gap:6px;}
.bar-label.me{color:#e2574c;} .bar-label.riv{color:#7b6cd9;}
.bar-track{flex:1; height:16px; background:#eef2f5; border-radius:999px; overflow:hidden;}
.bar-fill{height:100%; border-radius:999px; width:0%; transition:width .8s cubic-bezier(.2,.9,.3,1.2);}
.bar-fill.me{background:linear-gradient(90deg,#ff8a5c,#ff5b7f);}
.bar-fill.riv{background:linear-gradient(90deg,#9f8fef,#7b6cd9);}
.bar-val{width:100px; font-size:13px; font-weight:700; color:#8b95a0; text-align:right;}
.score-strip{
  margin-top:10px; background:linear-gradient(90deg,#fff6d8,#ffefc2);
  border-radius:14px; text-align:center; padding:10px; font-weight:800; color:#c98a1e; font-size:16px;
}
.next-evo{
  margin-top:8px; text-align:center; font-weight:900; font-size:15.5px; color:#e2574c;
  background:#fff0f3; border-radius:14px; padding:8px;
  animation:pulseBox 2.2s infinite;
}
/* ===== シーン ===== */
.scene-card{
  border-radius:22px; overflow:hidden; position:relative;
  box-shadow:0 6px 20px rgba(90,120,150,.15); background:#cdeffa;
}
#scene{display:block; width:100%; height:auto;}
.chip{
  position:absolute; background:rgba(255,255,255,.9); border-radius:999px;
  padding:5px 14px; font-weight:800; font-size:13.5px; box-shadow:0 2px 8px rgba(0,0,0,.1);
}
.chip.me{top:12px; left:12px; color:#e2574c;}
.chip.status{left:12px; bottom:10px; color:#2a9dd6;}
.chip.natsuo-name{left:auto; right:12px; bottom:10px; color:#5a9e46;}
/* ===== 浮遊フード ===== */
.fly-food{
  position:fixed; z-index:600; font-size:30px; pointer-events:none;
  transition:transform 1s cubic-bezier(.3,-.2,.6,1), opacity 1s;
}
/* ===== 紙吹雪 ===== */
.confetti{
  position:fixed; top:-24px; z-index:900; pointer-events:none; border-radius:3px;
  animation:confFall linear forwards;
}
@keyframes confFall{
  0%{transform:translateY(0) rotate(0deg)}
  100%{transform:translateY(115vh) rotate(760deg)}
}
/* ===== トースト ===== */
#toast{
  position:fixed; left:50%; top:80px; transform:translateX(-50%) scale(0);
  background:#fff; border-radius:999px; padding:12px 30px; font-weight:900; font-size:19px;
  box-shadow:0 8px 30px rgba(0,0,0,.2); z-index:950; color:#ff7043;
  transition:transform .35s cubic-bezier(.2,1.5,.4,1);
  pointer-events:none; white-space:nowrap;
}
#toast.show{transform:translateX(-50%) scale(1);}
/* ===== オーバーレイ ===== */
.overlay{
  position:fixed; inset:0; background:rgba(25,40,70,.72); z-index:700;
  display:flex; align-items:center; justify-content:center; padding:14px;
  backdrop-filter:blur(3px);
  animation:fadeIn .3s;
}
.overlay.hidden{display:none;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.panel{
  background:linear-gradient(160deg,#f2fbff,#fff8ec); border-radius:26px;
  width:min(760px,96vw); padding:22px; text-align:center; position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,.35);
  animation:popIn .4s cubic-bezier(.2,1.6,.4,1);
  max-height:96vh; overflow-y:auto;   /* ひくい画面でも スクロールで ぜんぶ見える */
}
@keyframes popIn{from{transform:scale(.6); opacity:0}to{transform:scale(1); opacity:1}}
.panel h2{font-size:26px; margin:4px 0 10px; border:none; color:#ff7043; letter-spacing:2px;}
.panel .desc{font-size:15px; color:#5d6b78; margin-bottom:10px; line-height:1.7;}
.big-btn{
  border:none; font-family:inherit; font-weight:900; font-size:24px; color:#fff;
  background:linear-gradient(140deg,#ff9558,#ff5b7f); border-radius:999px;
  padding:18px 54px; cursor:pointer; box-shadow:0 6px 0 #d64a68; letter-spacing:3px;
  transition:transform .08s, box-shadow .08s; margin-top:12px;
}
.big-btn:active{transform:translateY(5px); box-shadow:0 1px 0 #d64a68;}
.big-btn.blue{background:linear-gradient(140deg,#57b9ff,#5f7cff); box-shadow:0 6px 0 #4462d6;}
.big-btn.blue:active{box-shadow:0 1px 0 #4462d6;}
/* バトル舞台 */
.stage-box{
  position:relative; background:linear-gradient(180deg,#b8e8ff 0%,#dff6e4 62%,#ffe9ad 62.5%,#ffdf90 100%);
  border-radius:18px; height:340px; overflow:hidden; margin-top:8px;
  border:4px solid #fff;
}
.countdown{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:100px; font-weight:900; color:#ff7043; z-index:5;
  text-shadow:0 4px 0 #fff; pointer-events:none;
}
.cd-pop{animation:cdPop .9s ease-out;}
@keyframes cdPop{0%{transform:scale(2.4);opacity:0}30%{transform:scale(1);opacity:1}80%{opacity:1}100%{opacity:0}}
.runner{position:absolute; transition:none; will-change:left;}
.runner svg{display:block;}
.run-anim{animation:runHop .32s infinite;}
@keyframes runHop{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-9px) rotate(-4deg)}}
.goal-flag{position:absolute; right:12px; font-size:44px;}
.lane-line{position:absolute; left:0; right:0; border-bottom:3px dashed rgba(255,255,255,.8);}
.leaf{
  position:absolute; font-size:44px; cursor:pointer; z-index:6;
  filter:drop-shadow(0 3px 3px rgba(0,0,0,.15));
  transition:transform .15s;
}
.leaf:hover{transform:scale(1.15);}
.battle-hud{
  display:flex; justify-content:space-around; font-weight:900; font-size:19px; margin-top:10px;
}
.battle-hud .me{color:#e2574c;} .battle-hud .riv{color:#7b6cd9;}
.speech{
  position:absolute; background:#fff; border-radius:14px; padding:6px 12px; font-weight:800;
  font-size:14px; box-shadow:0 3px 10px rgba(0,0,0,.15); z-index:7; white-space:nowrap;
  animation:popIn .3s;
}
.speech:after{
  content:""; position:absolute; bottom:-8px; left:20px; border:8px solid transparent;
  border-top-color:#fff; border-bottom:none;
}
.obstacle{position:absolute; font-size:38px; z-index:4; will-change:left;}
/* 進化演出 */
.evo-stage{
  position:relative; height:300px; display:flex; align-items:center; justify-content:center;
  background:radial-gradient(circle at 50% 45%,#4a5a8a 0%,#232c4d 75%); border-radius:18px; overflow:hidden;
}
.evo-creature{transform-origin:center bottom; max-width:88vw; max-height:100%;}
.evo-shake{animation:evoShake .12s infinite;}
@keyframes evoShake{0%,100%{transform:translateX(-5px) rotate(-2deg)}50%{transform:translateX(5px) rotate(2deg)}}
.evo-flash{
  position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:8;
}
.evo-flash.go{animation:flashGo 1s ease-out forwards;}
@keyframes flashGo{0%{opacity:0}25%{opacity:1}100%{opacity:0}}
.evo-name{
  font-size:30px; font-weight:900; color:#ff7043; letter-spacing:2px; margin-top:12px;
  animation:popIn .5s .1s backwards;
}
.sparkle{position:absolute; font-size:26px; animation:sparkleAnim 1.4s ease-out forwards; pointer-events:none; z-index:9;}
@keyframes sparkleAnim{
  0%{transform:scale(0) rotate(0); opacity:1}
  60%{transform:scale(1.3) rotate(160deg); opacity:1}
  100%{transform:scale(.4) rotate(300deg); opacity:0}
}
/* シーン内アニメ（SVG用） */
.bob{animation:bobA 2.6s ease-in-out infinite; transform-box:fill-box; transform-origin:center bottom;}
@keyframes bobA{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.94) scaleX(1.02)}}
.sun-pulse{animation:sunP 5s ease-in-out infinite; transform-box:fill-box; transform-origin:center;}
@keyframes sunP{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.cloud-drift{animation:cloudD 38s linear infinite;}
.cloud-drift.slow{animation-duration:56s; animation-delay:-25s;}
@keyframes cloudD{from{transform:translateX(-240px)}to{transform:translateX(1120px)}}
.zzz{animation:zzzUp 2.4s ease-out infinite; opacity:0;}
.zzz.z2{animation-delay:.8s;} .zzz.z3{animation-delay:1.6s;}
@keyframes zzzUp{0%{opacity:0; transform:translate(0,0) scale(.6)}25%{opacity:1}100%{opacity:0; transform:translate(16px,-42px) scale(1.25)}}
.sway{animation:swayA 3.4s ease-in-out infinite; transform-box:fill-box; transform-origin:center bottom;}
@keyframes swayA{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
.pop-seg{animation:popSeg .5s cubic-bezier(.2,1.8,.4,1);}
@keyframes popSeg{from{transform:scale(.2)}to{transform:scale(1)}}
.glitter{animation:glitA 2s ease-in-out infinite;}
@keyframes glitA{0%,100%{opacity:.2}50%{opacity:1}}
.aura-pulse{animation:auraP 2.8s ease-in-out infinite; transform-box:fill-box; transform-origin:center;}
@keyframes auraP{0%,100%{opacity:.55; transform:scale(1)}50%{opacity:.95; transform:scale(1.07)}}
/* ===== タスクせってい ===== */
.mini-track{height:8px; background:#eef2f5; border-radius:999px; overflow:hidden; margin-top:6px; max-width:200px;}
.mini-fill{height:100%; border-radius:999px; transition:width .6s cubic-bezier(.2,.9,.3,1.2);}
.setup-row{display:flex; align-items:center; gap:8px; margin:8px 0; flex-wrap:wrap;}
.emoji-pick{
  font-size:26px; border:none; background:#fff; border-radius:12px; width:50px; height:50px;
  cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,.14); transition:transform .1s; flex-shrink:0;
}
.emoji-pick:active{transform:scale(.82);}
.setup-row input{
  flex:1; min-width:0; font-family:inherit; font-size:16px; font-weight:700; color:var(--ink);
  border:2px solid #dfe8ee; border-radius:12px; padding:11px 14px; outline:none; background:#fff;
}
.setup-row input:focus{border-color:#57b9ff;}
.setup-h{font-weight:900; color:#2a9dd6; text-align:left; margin:12px 0 2px;}
.panel.scrolly{max-height:92vh; overflow-y:auto;}
.setup-row input.mx{flex:none; width:70px; text-align:center; padding:11px 6px;}
.setup-row input.mx:disabled{background:#f0f4f7; color:#b6c2cb;}
.setup-row input.un{flex:none; width:70px; text-align:center; padding:11px 6px;}
.mode-tabs{display:flex; gap:4px; flex-shrink:0;}
.mode-btn{
  border:2px solid #dfe8ee; background:#fff; font-size:12px; font-weight:800; font-family:inherit;
  color:#5d6b78; border-radius:10px; padding:0 8px; height:38px; cursor:pointer; flex-shrink:0; opacity:.5;
  white-space:nowrap;
}
.mode-btn.on{border-color:#57b9ff; background:#e5f4ff; opacity:1; color:#2a9dd6;}
.hw-total{margin-top:14px; padding-top:12px; border-top:2px dashed #e3edf3;}
.hw-total-label{font-weight:800; font-size:14.5px; color:#5d6b78; margin-bottom:6px;}
.hw-total-label b{color:#ff8a3d; font-size:17px;}
.mini-track.big{max-width:none; height:13px;}
.help-block{
  background:#fff; border-radius:14px; padding:12px 14px; margin:8px 0;
  font-size:14px; line-height:1.8; text-align:left; color:#4a5560;
}
.help-block b{color:#ff8a3d;}
.del-btn{
  border:none; background:#ffe9ec; color:#e2574c; font-size:14px; font-weight:900;
  border-radius:10px; width:34px; height:34px; cursor:pointer; flex-shrink:0;
}
.add-btn{
  width:100%; border:2px dashed #b9d8e8; background:#f4fbff; color:#2a9dd6;
  font-family:inherit; font-weight:800; font-size:15px; border-radius:14px;
  padding:10px; cursor:pointer; margin:4px 0;
}
.add-btn:hover{background:#e5f4ff;}
.emoji-palette{
  position:fixed; z-index:850; background:#fff; border-radius:18px;
  box-shadow:0 12px 50px rgba(0,0,0,.35); padding:14px;
  display:grid; grid-template-columns:repeat(auto-fill,46px); gap:5px;
  width:min(92vw,388px); justify-content:center;
  left:50%; top:50%; transform:translate(-50%,-50%); max-height:72vh; overflow-y:auto;
}
.emoji-palette button{
  font-size:26px; border:none; background:#f4f8fa; border-radius:10px;
  width:46px; height:46px; cursor:pointer; transition:transform .1s;
}
.emoji-palette button:hover{background:#dff0fa; transform:scale(1.12);}
/* ===== はなび ===== */
.stage-box.night{background:linear-gradient(180deg,#141c4a 0%,#2c3a75 60%,#0d1430 100%); cursor:crosshair;}
.fw-rocket{
  position:absolute; bottom:0; width:6px; height:16px; background:#ffe985;
  border-radius:3px; transition:transform .5s ease-in; z-index:5; pointer-events:none;
  box-shadow:0 0 8px #ffe985;
}
.fw-p{
  position:absolute; width:7px; height:7px; border-radius:2px; z-index:6; pointer-events:none;
  transition:transform 1s ease-out, opacity 1s ease-out;
}
.fw-star{position:absolute; color:#fff; font-size:8px; animation:glitA 2.4s infinite; pointer-events:none;}
.fw-msg{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  text-align:center; font-size:25px; font-weight:900; color:#fff; line-height:1.8;
  text-shadow:0 3px 14px rgba(0,0,0,.7); z-index:8; animation:popIn .6s; pointer-events:none;
}
#resetBtn{
  position:fixed; right:10px; bottom:10px; border:none; background:rgba(255,255,255,.6);
  color:#9aa7b0; font-family:inherit; font-size:12px; border-radius:8px; padding:6px 12px; cursor:pointer;

<script>
"use strict";
/* ================= コア：定義・状態・タスク・カレンダー ================= */
const $ = s => document.querySelector(s);
const TOKI_VER="v3";   // バージョン確認用（⚙️設定の見出しに表示）
const KEY = "natsuyasumin_toki_v1";   // 公開版とは完全に別のデータ保存キー

/* ---------- プレイヤープロファイル（きょうだい対応） ----------
   既存プレイヤーは自動的に「きみ」(p1)になり、データは今までのキーのまま（こわさない）。
   追加プレイヤーは別キーに保存され、それぞれ独立して遊べる */
const PKEY = "natsuyasumin_toki_profiles";
function loadProfiles(){
  try{
    const raw=localStorage.getItem(PKEY);
    if(raw){ const p=JSON.parse(raw); if(p && p.list && p.list.length) return p; }
  }catch(e){}
  return {list:[{id:"p1",name:"とき"}], activeId:"p1"};
}
let PROFILES=loadProfiles();
function saveProfiles(){ try{ localStorage.setItem(PKEY, JSON.stringify(PROFILES)); }catch(e){} }
function activeProfile(){ return PROFILES.list.find(p=>p.id===PROFILES.activeId)||PROFILES.list[0]; }
function dataKey(){ const id=activeProfile().id; return id==="p1" ? KEY : KEY+"_"+id; }
function pName(){ return activeProfile().name||"とき"; }

const EMOJI_COLORS={
  "🍉":"#ff6b81","🍋":"#ffd93d","🫐":"#5f7cff","🌻":"#ff9f43","🍧":"#4dd0e1","🍇":"#9c6ade","🍑":"#ff8fab","🥝":"#7bc86c",
  "🍎":"#e74c3c","🍊":"#ff8c42","🍓":"#ff5b7f","🍌":"#ffe066","🌽":"#ffd23f","🍅":"#ff6347","🥕":"#ff7f2a","🍈":"#a8d861",
  "🍔":"#c97b3d","🍕":"#e8593a","🍩":"#d977b0","🍦":"#f7d9a0","🍪":"#c68e5a","🎂":"#f2a7c3","🍜":"#e0a34e","🍣":"#fa8072",
  "🌮":"#f5b445","🍿":"#ffdd77","🧁":"#e79fd0","🍭":"#e35fb2","🍡":"#ec9baf","🍙":"#c9cdd2","🍤":"#ff9d76","🥐":"#e6b566",
  "🦄":"#c77dff","👾":"#8862f0","🤖":"#7f8c9b","👻":"#bfc9e8","💩":"#b07a4a","🦖":"#4caf50","🦕":"#7fb3d5","🐙":"#e57373",
  "🚀":"#6f8bd1","⚽":"#6d7f8c","🎮":"#5e6ad2","🌈":"#ff7eb3","💎":"#4fc3f7","🔥":"#ff5722","⭐":"#ffc107","🍄":"#e2574c"
};
const EMOJIS=Object.keys(EMOJI_COLORS);
function colorOf(e){ return EMOJI_COLORS[e]||"#7bc86c"; }
const STAGES = [
  {name:"たまご",                     min:0},
  {name:"いもむし",                   min:5},
  {name:"せみ",                       min:11},
  {name:"くわがた",                   min:18},
  {name:"ギラファノコギリクワガタ",   min:27},
  {name:"さる",                       min:53},
  {name:"もぐら",                     min:60},
  {name:"てんとうむし",               min:66},
  {name:"とかげ",                     min:72},
  {name:"かめ",                       min:78},
  {name:"コーカサスオオカブト",       min:84},
  {name:"かたつむり",                 min:88},
  {name:"いるか",                     min:92},
  {name:"ティラノサウルス",           min:96},
  {name:"ヘラクレスオオカブト",       min:101},
];
/* タスクの量と なつやすみの長さに合わせて、進化に必要な数を自動調整する。
   宿題のカウントが多い設定でも 早々に最終形態にならず、夏休み全体で楽しめるペースにする */
function computeStages(){
  const D=Math.max(7,Math.round((vacEnd()-vacStart())/86400000)+1);   // 休みの日数
  const daily=S.tasksDef.length;
  const hwSum=S.hwDef.reduce((a,h)=>a+(h.max>0?h.max:0),0);           // ♾️は除外
  const T=Math.round(0.45*daily*D + 0.7*hwSum);                       // 期待できる合計タスク数のめやす
  STAGES[1].min=5;                                                    // ふ化だけは すぐ楽しめるように固定
  /* 序盤（〜ギラファ）はタスク量に比例 */
  const fr=[0,0,0.11,0.19,0.28];
  let prev=5;
  for(let i=2;i<=4;i++){
    prev=Math.max(prev+4, Math.round(T*fr[i]));
    STAGES[i].min=prev;
  }
  /* さる以降は タスク量を増やしても つねに「5〜7個きざみ」でイベント連発
     （49の下限つき＝初期値48から どんな設定でも 勝手に進化しない安全ガード） */
  const step=Math.min(7, Math.max(5, Math.round(T*0.052)));
  prev=Math.max(prev+5, 49, Math.round(T*0.46));
  STAGES[5].min=prev;
  for(let i=6;i<STAGES.length;i++){
    prev+=step;
    STAGES[i].min=prev;
  }
}
function parseYMD(s){ const p=String(s).split("-"); return new Date(+p[0], +p[1]-1, +p[2]); }
function vacStart(){ return parseYMD(S.vacStart||"2026-07-21"); }
function vacEnd(){ const e=parseYMD(S.vacEnd||"2026-08-31"); return e<vacStart()?vacStart():e; }

function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function defaultState(){
  return {
    day: todayStr(),
    daily:{}, hw:{drill:0,kenkyu:0,dokusho:0},
    tasksDef:[
      {id:"t1",name:"おんどく",emoji:"🍉"},
      {id:"t2",name:"けいさん",emoji:"🍋"},
      {id:"t3",name:"おてつだい",emoji:"🫐"},
      {id:"t4",name:"ラジオたいそう",emoji:"🌻"},
      {id:"t5",name:"えにっき",emoji:"🍧"},
    ],
    hwDef:[
      {id:"drill",  name:"なつやすみドリル", emoji:"🍇", max:20, unit:"ページ", btn:"+1ページ"},
      {id:"kenkyu", name:"じゆうけんきゅう", emoji:"🍑", max:1,  unit:"かい",   btn:"+1かい"},
      {id:"dokusho",name:"どくしょ",         emoji:"🥝", max:0,  unit:"さつ",   btn:"+1さつ"},   /* max 0 = むげん */
    ],
    segs:[], stageIdx:0, evoAt:0,
    natsuoSegs:[], natsuoStageIdx:0, natsuoEvoAt:0,
    score:{me:0,riv:0}, battles:0,
    stamps:{}, muted:false, setupDone:false, finaleDone:false,
    hwFin:{},   // ざっくりモードの「ぜんぶおわった」フラグ
    vacStart:"2026-07-21", vacEnd:"2026-08-31"
  };
}
/* ときくんの いまの進捗（スクショ時点）を初期値として焼き込み。設定⚙️からいつでも変更可能 */
function tokiInitialState(){
  const s=defaultState();
  s.setupDone=true;
  s.tasksDef=[{id:"t1",name:"スマイルカレンダー",emoji:"🌈"}];
  s.hwDef=[
    {id:"h1",name:"なつやすみドリル",emoji:"💩",max:64,unit:"ページ",btn:"+1ページ",mode:"count"},
    {id:"h2",name:"チャレンジさっし",emoji:"👻",max:22,unit:"ページ",btn:"+1ページ",mode:"count"},
    {id:"h3",name:"プリント集",emoji:"🎮",max:38,unit:"ページ",btn:"+1ページ",mode:"count"},
    {id:"h4",name:"絵日記",emoji:"👾",max:1,unit:"かい",btn:"+1かい",mode:"count"},
    {id:"h5",name:"ひまわりどくしょ",emoji:"⭐",max:11,unit:"かい",btn:"+1かい",mode:"count"},
    {id:"h6",name:"おこめの作文",emoji:"💎",max:1,unit:"こ",btn:"+1こ",mode:"count"},
    {id:"h7",name:"みどりの絵",emoji:"🚀",max:1,unit:"こ",btn:"+1こ",mode:"count"},
  ];
  s.hw={h1:19,h2:9,h3:1,h4:0,h5:10,h6:0,h7:0};
  const pal=["#ff7eb3","#b07a4a","#bfc9e8","#5e6ad2","#8862f0","#ffc107","#4fc3f7","#6f8bd1"];
  for(let i=0;i<48;i++) s.segs.push(pal[i%pal.length]);
  s.stageIdx=4; s.evoAt=40;
  for(let i=0;i<26;i++) s.natsuoSegs.push(natsuoColor());
  s.natsuoStageIdx=3; s.natsuoEvoAt=20;
  s.score={me:3,riv:1}; s.battles=4;
  s.stamps={"2026-07-22":true};
  s.vacStart="2026-07-21"; s.vacEnd="2026-08-31";
  return s;
}
function load(){
  try{
    const raw = localStorage.getItem(dataKey());
    if(!raw) return activeProfile().id==="p1" ? tokiInitialState() : defaultState();
    const s = Object.assign(defaultState(), JSON.parse(raw));
    if(s.day !== todayStr()){           // あたらしい日：デイリータスクをリセット
      s.day = todayStr();
      s.daily = {};
      const prevRi = s.natsuoStageIdx;
      const gain = Math.random()<0.5 ? 1 : (Math.random()<0.5?2:0);   // なつおは寝てる間にすこし成長
      for(let i=0;i<gain;i++) s.natsuoSegs.push(natsuoColor());
      s.natsuoStageIdx = stageFor(s.natsuoSegs.length);
      if(s.natsuoStageIdx>prevRi) s.natsuoEvoAt = s.natsuoSegs.length;
    }
    /* 移行処理：最終形態が追加される前にエンディングを見た人は、新しい最終形態でもう一度見られる */
    if(s.finaleDone && s.stageIdx<STAGES.length-1) s.finaleDone=false;
    return s;
  }catch(e){ return defaultState(); }
}
function save(){ try{ localStorage.setItem(dataKey(), JSON.stringify(S)); }catch(e){} }
function stageFor(n){ let idx=0; STAGES.forEach((st,i)=>{ if(n>=st.min) idx=i; }); return idx; }
function natsuoColor(){ const c=["#9ccc65","#7cb342","#aed581","#c5e1a5","#8bc34a"]; return c[Math.floor(Math.random()*c.length)]; }

let S = load();
computeStages();

/* ---------- サウンド ---------- */
let actx = null;
function ac(){ if(!actx){ try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return actx; }
function tone(freq, dur, type, vol, when){
  const a = ac(); if(!a || S.muted) return;
  if(a.state==="suspended"){ try{ a.resume(); }catch(e){} }
  const o=a.createOscillator(), g=a.createGain();
  o.type=type||"sine"; o.frequency.value=freq;
  g.gain.setValueAtTime(vol||0.12, a.currentTime+(when||0));
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime+(when||0)+dur);
  o.connect(g); g.connect(a.destination);
  o.start(a.currentTime+(when||0)); o.stop(a.currentTime+(when||0)+dur+0.05);
}
const SFX = {
  pop(){ tone(660,.12,"sine",.15); tone(880,.15,"sine",.12,.06); },
  yum(){ tone(520,.1,"square",.06); tone(650,.1,"square",.06,.09); tone(780,.14,"square",.06,.18); },
  boom(){
    /* ハッピーな花火：ぽんっ→メジャー和音がキラキラひろがる */
    const roots=[523,587,659,784];   // ドレミソ からランダム
    const f=roots[Math.floor(Math.random()*roots.length)];
    tone(f*0.5,.16,"triangle",.12);                                     // ぽんっ
    [1,1.25,1.5,2].forEach((r,i)=>tone(f*r,.4,"sine",.09,.06+i*0.06));  // ドミソド♪
    [3,2.5,2,1.5].forEach((r,i)=>tone(f*r,.3,"sine",.045,.34+i*0.11)); // キラキラ降る余韻
  },
  whistle(){ tone(500,.08,"sine",.07); tone(700,.08,"sine",.07,.07); tone(1000,.1,"sine",.07,.14); tone(1400,.16,"sine",.06,.21); },
  tick(){ tone(880,.08,"sine",.1); },
  go(){ tone(1320,.4,"sine",.14); },
  jump(){ tone(500,.08,"sine",.1); tone(900,.12,"sine",.1,.05); },
  ouch(){ tone(220,.25,"sawtooth",.08); },
  win(){ [523,659,784,1047].forEach((f,i)=>tone(f,.22,"sine",.13,i*0.13)); },
  lose(){ [392,330,262].forEach((f,i)=>tone(f,.3,"sine",.1,i*0.2)); },
  fanfare(){ [523,523,523,659,784,784,1047].forEach((f,i)=>tone(f,.2,"square",.06,i*0.14)); [262,330,392,523].forEach((f,i)=>tone(f,.5,"sine",.08,i*0.25)); },
  sparkle(){ [1200,1500,1800,2200].forEach((f,i)=>tone(f,.15,"sine",.06,i*0.07)); },
};
$("#muteBtn").addEventListener("click",()=>{ S.muted=!S.muted; $("#muteBtn").textContent=S.muted?"🔇":"🔊"; save(); });

/* ---------- トースト・紙吹雪 ---------- */
let toastTimer=null;
function toast(msg, ms){
  const t=$("#toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"), ms||1800);
}
function confetti(n){
  const colors=["#ff6b81","#ffd93d","#5f7cff","#ff9f43","#4dd0e1","#9c6ade","#7bc86c","#ff8fab"];
  for(let i=0;i<(n||40);i++){
    const p=document.createElement("div"); p.className="confetti";
    const size=6+Math.random()*8;
    p.style.cssText = "left:"+(Math.random()*100)+"vw;width:"+size+"px;height:"+(size*1.4)+"px;background:"+
      colors[i%colors.length]+";animation-duration:"+(1.6+Math.random()*1.6)+"s;animation-delay:"+(Math.random()*0.5)+"s;";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 4000);
  }
}

/* ---------- カレンダー ---------- */
function renderCalendar(){
  const strip=$("#calStrip"); strip.innerHTML="";
  const wds=["日","月","火","水","木","金","土"];
  const today=new Date(); today.setHours(0,0,0,0);
  const VS=vacStart(), VE=vacEnd();
  let count=0;
  for(let d=new Date(VS); d<=VE && count<120; d.setDate(d.getDate()+1), count++){
    const cell=document.createElement("div");
    const wd=d.getDay();
    cell.className="day"+(wd===0?" sun":"")+(wd===6?" sat":"");
    if(d.getTime()===today.getTime()) cell.classList.add("today");
    const ds=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    const stamped = !!S.stamps[ds];
    if(stamped) cell.classList.add("stamped");
    const label=(d.getDate()===1||d.getTime()===VS.getTime())?(d.getMonth()+1)+"/"+d.getDate():d.getDate();
    cell.innerHTML='<div class="num">'+label+'</div><div class="box">'+(stamped?"🌻":"")+'</div><div class="wd">'+wds[wd]+'</div>';
    strip.appendChild(cell);
  }
  const t=new Date();
  $("#todayLabel").textContent="きょう："+(t.getMonth()+1)+"/"+t.getDate()+"（"+wds[t.getDay()]+"）";
  const diff=Math.ceil((VS-today)/86400000);
  if(diff>0) $("#calCount").innerHTML="なつやすみまで あと <b>"+diff+"にち</b>";
  else if(today<=VE){ const n=Math.floor((today-VS)/86400000)+1; $("#calCount").innerHTML="なつやすみ <b>"+n+"にちめ</b>！たのしもう☀️"; }
  else $("#calCount").innerHTML="なつやすみ、おつかれさま！🎉";
}

/* ---------- タスクUI ---------- */
function renderTasks(){
  const list=$("#dailyList"); list.innerHTML="";
  S.tasksDef.forEach(t=>{
    const done=!!S.daily[t.id];
    const row=document.createElement("div");
    row.className="task-row"+(done?" finished":"");
    row.innerHTML='<div class="task-emoji">'+t.emoji+'</div>'+
      '<div class="task-info"><div class="task-name">'+esc(t.name)+'</div><div class="task-sub">'+(done?"きょう できた！⭐":"きょう まだ")+'</div></div>';
    const btn=document.createElement("button");
    btn.className="task-btn"+(done?" done":"");
    btn.style.background=colorOf(t.emoji);
    btn.textContent=done?"できた⭐":"やった！";
    if(!done) btn.addEventListener("click",()=>completeDaily(t,btn));
    row.appendChild(btn); list.appendChild(row);
  });

  const hw=$("#hwList"); hw.innerHTML="";
  S.hwDef.forEach(h=>{
    const v=S.hw[h.id]||0;
    const mode=hwModeOf(h);
    const done = mode==="count" ? v>=h.max : mode==="rough" ? !!S.hwFin[h.id] : false;
    const row=document.createElement("div");
    row.className="task-row"+(done?" hw-done":"");
    let sub, btnLabel, barPct=null;
    if(mode==="inf"){
      sub=v+" "+esc(h.unit)+"（♾️むげん）"; btnLabel="+1"+h.unit;
    }else if(mode==="rough"){
      sub=done?"ぜんぶできた！🎉":(v>0?v+"かい がんばった":"やったら おそう");
      btnLabel="やった！";
      barPct=done?100:null;   // ざっくりはバーなし（✅で100%だけ表示）
    }else{
      sub=v+" / "+h.max+" "+esc(h.unit)+(done?"　ぜんぶできた！🎉":"");
      btnLabel="+1"+h.unit;
      barPct=Math.min(100,Math.round(v/h.max*100));
    }
    const bar = barPct===null ? "" :
      '<div class="mini-track"><div class="mini-fill" style="width:'+barPct+'%;background:'+colorOf(h.emoji)+'"></div></div>';
    row.innerHTML='<div class="task-emoji">'+h.emoji+'</div>'+
      '<div class="task-info"><div class="task-name">'+esc(h.name)+'</div><div class="task-sub">'+sub+'</div>'+bar+'</div>';
    const btn=document.createElement("button");
    btn.className="task-btn"+(done?" done-strong":"");
    if(!done) btn.style.background=colorOf(h.emoji);
    btn.textContent=done?"✅ かんりょう！":btnLabel;
    if(!done) btn.addEventListener("click",()=>completeHomework(h,btn));
    if(mode==="rough" && !done){
      const wrap=document.createElement("div");
      wrap.style.cssText="display:flex;flex-direction:column;gap:5px;align-items:stretch;";
      wrap.appendChild(btn);
      const fbtn=document.createElement("button");
      fbtn.className="task-btn";
      fbtn.style.cssText="background:#7bc86c;font-size:12px;padding:6px 10px;min-width:0;";
      fbtn.textContent="✅ ぜんぶおわった";
      fbtn.addEventListener("click",()=>finishRough(h));
      wrap.appendChild(fbtn);
      row.appendChild(wrap);
    }else{
      row.appendChild(btn);
    }
    hw.appendChild(row);
  });
  /* しゅくだい ぜんたいの進捗バー（♾️は除く） */
  const fin=S.hwDef.filter(h=>hwModeOf(h)!=="inf");
  if(fin.length){
    let sum=0, mx=0;
    fin.forEach(h=>{
      /* ざっくりは「やった！」の回数では動かず、✅で満点ぶんが加算される */
      if(hwModeOf(h)==="rough"){ mx+=10; sum+= S.hwFin[h.id]?10:0; }
      else{ mx+=h.max; sum+=Math.min(S.hw[h.id]||0,h.max); }
    });
    const pct=Math.round(sum/mx*100);
    hw.insertAdjacentHTML("beforeend",
      '<div class="hw-total"><div class="hw-total-label">📚 しゅくだい ぜんたい <b>'+pct+'%</b>'+(pct>=100?"　コンプリート！🎉":"")+'</div>'+
      '<div class="mini-track big"><div class="mini-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#ffd93d,#ff9f43,#ff5b7f)"></div></div></div>');
  }
}

function completeDaily(t,btn){
  if(S.daily[t.id]) return;
  S.daily[t.id]=true;
  eatFood(t.emoji, colorOf(t.emoji), btn);
  if(S.tasksDef.every(x=>S.daily[x.id])){
    S.stamps[todayStr()]=true;
    setTimeout(()=>{ toast("🌻 きょうのタスク ぜんぶクリア！すごい！！",2600); confetti(70); SFX.win(); renderCalendar(); },1100);
  }
  save(); renderTasks();
}
function completeHomework(h,btn){
  const mode=hwModeOf(h);
  if(mode==="count" && S.hw[h.id]>=h.max) return;
  if(mode==="rough" && S.hwFin[h.id]) return;
  S.hw[h.id]=(S.hw[h.id]||0)+1;
  eatFood(h.emoji, colorOf(h.emoji), btn);
  save(); renderTasks();
}
function finishRough(h){
  if(S.hwFin[h.id]) return;
  if(!confirm("「"+h.name+"」は ほんとうに ぜんぶ おわった？")) return;   // おしまちがい防止
  S.hwFin[h.id]=true; save(); renderTasks();
  toast("🎉 「"+h.name+"」ぜんぶ おわった！すごい！！",2600); confetti(60); SFX.win();
  setTimeout(checkFinale,900);
}

/* ---------- たべる → 成長 ---------- */
let busy=false;   // バトル/進化中の多重発火よけ
function eatFood(emoji,color,btn){
  SFX.pop();
  const r=btn.getBoundingClientRect();
  const f=document.createElement("div");
  f.className="fly-food"; f.textContent=emoji;
  f.style.left=r.left+r.width/2+"px"; f.style.top=r.top+"px";
  document.body.appendChild(f);
  const target=creatureScreenPos();
  requestAnimationFrame(()=>{
    f.style.transform="translate("+(target.x-r.left-r.width/2)+"px,"+(target.y-r.top)+"px) scale(.4)";
    f.style.opacity="0.1";
  });
  setTimeout(()=>{
    f.remove(); SFX.yum();
    addSegment(color);
  },950);
}
function addSegment(color){
  S.segs.push(color);
  const prevRi=S.natsuoStageIdx;
  if(S.natsuoStageIdx===0){
    // たまごの間だけ なつおは やるき満々（先に進化する）
    S.natsuoSegs.push(natsuoColor());
    if(Math.random()<0.6) S.natsuoSegs.push(natsuoColor());
  }else if(Math.random()<0.4){
    // それ以降はサボり気味
    S.natsuoSegs.push(natsuoColor());
  }
  const newStage=stageFor(S.segs.length);
  S.natsuoStageIdx=stageFor(S.natsuoSegs.length);
  if(S.natsuoStageIdx>prevRi){
    S.natsuoEvoAt=S.natsuoSegs.length;
    const nm=STAGES[S.natsuoStageIdx].name;
    const msg = S.natsuoStageIdx>stageFor(S.segs.length)
      ? "😲 なつおが さきに "+nm+" になった！はやい！！"
      : "🌱 なつおも "+nm+" に しんかした（サボりながら…）";
    setTimeout(()=>{ toast(msg,2600); SFX.sparkle(); renderScene(); },1300);
  }
  save();
  renderScene(true); renderBars();
  if(newStage>S.stageIdx && !busy){
    busy=true;
    setTimeout(()=>startStageUp(S.stageIdx+1),700);
  }else{
    /* ヘラクレス後は 6個ごとに ボーナスバトル発生（花火まで あそびが とぎれない） */
    if(S.stageIdx===STAGES.length-1 && !busy){
      const k=S.segs.length-STAGES[STAGES.length-1].min;
      if(k>0 && k%6===0){
        busy=true; bonusMode=true; S.battles++; revenge=false; save();
        const types=["race","leaf","jump","climb","dig","janken","fuse","suika","baseball","fishing","hoop","volcano"];
        const t=types[Math.floor(Math.random()*types.length)];
        setTimeout(()=>showBattleIntro(t,S.battles,null),800);
      }
    }
    setTimeout(checkFinale,600);
  }
}
/* ---------- グランドフィナーレ判定 ---------- */
function checkFinale(){
  if(S.finaleDone || busy || S.stageIdx<STAGES.length-1) return;
  const fin=S.hwDef.filter(h=>hwModeOf(h)!=="inf");
  if(!fin.length) return;
  const allDone=fin.every(h=> hwModeOf(h)==="rough" ? !!S.hwFin[h.id] : (S.hw[h.id]||0)>=h.max);
  if(!allDone) return;
  busy=true;
  setTimeout(runFinale,700);
}

/* ---------- バー ---------- */
function renderBars(){
  const n=S.segs.length, idx=S.stageIdx;
  $("#meStageName").textContent=STAGES[idx].name;
  $("#rivStageName").textContent=STAGES[S.natsuoStageIdx].name;
  if(idx>=STAGES.length-1){
    $("#meBar").style.width="100%";
    $("#meBarVal").textContent="👑 さいきょう！";
  }else{
    const cur=STAGES[idx].min, nxt=STAGES[idx+1].min;
    const p=Math.max(0,Math.min(1,(n-cur)/(nxt-cur)));
    $("#meBar").style.width=(p*100)+"%";
    $("#meBarVal").textContent=n+" / "+nxt;
  }
  const rn=S.natsuoSegs.length, ri=S.natsuoStageIdx;
  if(ri>=STAGES.length-1){ $("#rivBar").style.width="100%"; }
  else{
    const cur=STAGES[ri].min, nxt=STAGES[ri+1].min;
    $("#rivBar").style.width=(Math.max(0,Math.min(1,(rn-cur)/(nxt-cur)))*100)+"%";
  }
  $("#scoreStrip").textContent="🏆 "+pName()+" "+S.score.me+" - "+S.score.riv+" なつお";
  document.querySelector(".chip.me").textContent=pName();
  /* あと何個で しんか＆ミニゲームか（ときくん向けのわかりやすい表示） */
  const ne=$("#nextEvo");
  if(idx>=STAGES.length-1){
    const k=Math.max(0, n-STAGES[STAGES.length-1].min);
    const rem=6-(k%6);
    ne.textContent="🎪 あと "+rem+"こで ボーナスバトル！しゅくだいを ぜんぶ おわらせると…？🎆";
  }else{
    const need=Math.max(1, STAGES[idx+1].min - n);
    ne.textContent="🎮 あと "+need+"こ タスクをやると しんか＆ミニゲーム！";
  }
}

function gradStops(colors){
  const cs = (colors && colors.length) ? colors : ["#c5e1a5","#aed581"];
  const list = cs.length===1 ? [cs[0],cs[0]] : cs;
  return list.map((c,i)=>'<stop offset="'+(i/(list.length-1)*100)+'%" stop-color="'+c+'"/>').join("");
}

/* ---- RPG風ピクセルアート背景（10pxグリッド） ---- */
function pxr(x,y,w,h,c,o){ return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+c+'"'+(o?' opacity="'+o+'"':'')+'/>'; }
function pxMound(cx,base,wd,ht,c){
  let out=""; const rows=Math.max(3,Math.round(ht/10));
  for(let i=0;i<rows;i++){
    const w=Math.max(20,Math.round(wd*Math.sqrt(1-(i/rows)*(i/rows))/20)*20);
    out+=pxr(cx-w/2, base-(i+1)*10, w, 10, c);
  }
  return out;
}
function pxCloud(cx,cy){
  let o="";
  [[30,0,80],[10,10,130],[0,20,170],[10,30,140]].forEach(r=>{ o+=pxr(cx+r[0],cy+r[1],r[2],10,"#ffffff"); });
  o+=pxr(cx+10,cy+30,30,10,"#e6f5ff")+pxr(cx+120,cy+30,30,10,"#e6f5ff")+pxr(cx+40,cy-10,40,10,"#ffffff");
  return o;
}
function pxTree(x){
  let o=pxr(x,496,20,60,"#8b5a2b")+pxr(x+4,496,6,60,"#a06a35");
  o+=pxMound(x+10,500,170,110,"#3f9e4d");
  o+=pxr(x-40,430,10,10,"#5cb85f")+pxr(x+30,410,10,10,"#5cb85f")+pxr(x-10,400,10,10,"#5cb85f")+
     pxr(x+50,440,10,10,"#2e8b3f")+pxr(x-30,460,10,10,"#2e8b3f");
  return o;
}
function pxFlower(x,pet){
  return pxr(x+8,538,4,18,"#3f9e4d")+pxr(x+2,546,6,4,"#3f9e4d")+
    pxr(x,528,20,10,pet)+pxr(x+4,522,12,6,pet)+pxr(x+6,530,8,6,"#ffd93d");
}
function sceneStatics(){
  /* 空：うつくしいグラデーション */
  let s='<defs><linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">'+
    '<stop offset="0%" stop-color="#2f8fd6"/><stop offset="35%" stop-color="#67bdec"/>'+
    '<stop offset="70%" stop-color="#a5ddf6"/><stop offset="100%" stop-color="#dff4ff"/></linearGradient></defs>'+
    '<rect width="1000" height="640" fill="url(#skyGrad)"/>'+
    '<g shape-rendering="crispEdges">';
  /* ピクセル太陽（10pxグリッドのまる） */
  const sx=830,sy=40;
  s+='<g class="sun-pulse">';
  [[20,0,40],[10,10,60],[0,20,80],[0,30,80],[0,40,80],[10,50,60],[20,60,40]].forEach(r=>{ s+=pxr(sx+r[0],sy+r[1],r[2],10,"#ffd93d"); });
  s+=pxr(sx+20,sy+20,40,30,"#ffe985");
  s+=pxr(sx+30,sy-20,20,10,"#ffe066")+pxr(sx+30,sy+80,20,10,"#ffe066")+
     pxr(sx-20,sy+30,10,20,"#ffe066")+pxr(sx+90,sy+30,10,20,"#ffe066");
  s+='</g>';
  /* 雲（はしからはしまで ながれる） */
  s+='<g class="cloud-drift">'+pxCloud(0,80)+'</g>';
  s+='<g class="cloud-drift slow">'+pxCloud(0,200)+'</g>';
  /* とおくの山なみ */
  s+=pxMound(120,470,440,130,"#5a9e6f")+pxMound(520,470,380,90,"#6fae7c")+pxMound(880,470,440,150,"#5a9e6f");
  s+=pxr(80,370,10,10,"#7cc08d")+pxr(500,400,10,10,"#8fc79b")+pxr(860,350,10,10,"#7cc08d");
  /* くさはら（奥） */
  s+=pxr(0,470,1000,86,"#79b851");
  for(let x=0;x<1000;x+=50){
    const yy=480+((x/50)%4)*18;
    s+=pxr(x+20,yy,8,6,"#8ecf64")+pxr(x+34,yy+10,6,4,"#639f3f");
  }
  /* 木 */
  s+=pxTree(56)+pxTree(890);
  /* 地面：草タイル（10px） */
  for(let x=0;x<1000;x+=10){
    s+=pxr(x,556,10,10,(x/10)%2?"#6ab04c":"#78c850");
    s+=pxr(x,566,10,10,(x/10)%2?"#5da344":"#6ab04c");
  }
  for(let x=0;x<1000;x+=30){ s+=pxr(x+6,550,4,6,"#78c850")+pxr(x+18,552,4,4,"#5da344"); }
  /* 土（10pxスペックル） */
  s+=pxr(0,576,1000,64,"#c98d5a");
  for(let x=0;x<1000;x+=40){
    s+=pxr(x+8,586,10,6,"#b07a4a")+pxr(x+26,602,8,6,"#b07a4a")+
       pxr(x+14,616,8,4,"#d8a06c")+pxr(x+32,628,6,4,"#a06a3f");
  }
  /* はな */
  s+=pxFlower(150,"#ff6b81")+pxFlower(480,"#ffd93d")+pxFlower(620,"#ff9f43")+pxFlower(940,"#e493ff");
  /* かんばん（テキストは中におさめる） */
  s+=pxr(374,504,12,52,"#8b5a2b")+pxr(324,474,112,36,"#a06a35")+pxr(328,478,104,28,"#e8c9a4");
  s+='</g><text x="380" y="498" font-size="14" font-weight="800" fill="#5d3a1a" text-anchor="middle">なつやすみ村</text>';
  return s;
}

function speech(box,x,y,msg,ms){

function countdown(box,cb){
  const cd=document.createElement("div"); cd.className="countdown"; box.appendChild(cd);

  seq.forEach((t,i)=>bTimeout(()=>{

}

/* ---------- かけっこレース ---------- */
function runRace(battleNo,newIdx){
  const ov=$("#overlay");
  ov.innerHTML='<div class="panel"><h2>🏁 かけっこレース！</h2>'+
    '<div class="stage-box" id="btlBox">'+
      '<div class="lane-line" style="top:46%"></div>'+
      '<div class="goal-flag" style="top:6%">🚩</div><div class="goal-flag" style="top:52%">🚩</div>'+
      '<div class="runner" id="rMe" style="left:2%;top:8%;">'+miniMe("gRm",84)+'</div>'+
      '<div class="runner" id="rRiv" style="left:2%;top:54%;">'+miniRiv("gRr",84)+'</div>'+
    '</div>'+
    '<button class="big-btn" id="dashBtn" disabled style="opacity:.5">はしる！！（れんだ）</button></div>';
  const box=$("#btlBox"), me=$("#rMe"), riv=$("#rRiv"), btn=$("#dashBtn");
  let mePos=2, rivPos=2, meV=0, running=false, napping=false, dashed=false, ended=false;
  const GOAL=82;
  btn.addEventListener("pointerdown",()=>{
    if(!running) return;
    meV=Math.min(meV+15,46); SFX.jump();
    me.classList.add("run-anim");
  });
  countdown(box,()=>{
    running=true; btn.disabled=false; btn.style.opacity="1";
    me.classList.add("run-anim"); riv.classList.add("run-anim");
    let last=performance.now();
    // なつおの作戦（初戦だけ本気。リベンジ以降は昼寝グセが出る）
    const scripted=(battleNo===1 && !revenge);
    if(!scripted){
      bTimeout(()=>{ napping=true; riv.classList.remove("run-anim");
        speech(box,(rivPos+4)+"%","44%","ちょっと きゅうけい…zzz",3200); },2800);
      bTimeout(()=>{ napping=false; riv.classList.add("run-anim");
        speech(box,(rivPos+4)+"%","44%","はっ！ねてた！",1400); },6300);
    }
    function frame(now){
      if(ended) return;
      const dt=Math.min((now-last)/1000,0.05); last=now;
      mePos+=meV*dt; meV*=Math.exp(-2.4*dt);
      if(meV<2) me.classList.remove("run-anim");
      let rv = scripted ? 13 : 10;
      if(napping) rv=0;
      rivPos+=rv*dt;
      if(scripted && mePos>48){
        if(!dashed){ dashed=true; speech(box,(rivPos+4)+"%","44%","まさかの ほんき！！",2000); SFX.go(); }
        rivPos=Math.max(rivPos, mePos+4);   // 初回はぜったい勝てない
      }
      me.style.left=Math.min(mePos,GOAL)+"%";
      riv.style.left=Math.min(rivPos,GOAL)+"%";
      if(mePos>=GOAL || rivPos>=GOAL){
        ended=true; running=false;
        finishBattle(mePos>=GOAL && mePos>=rivPos, battleNo, newIdx, "race");
        return;
      }
      battleRaf=requestAnimationFrame(frame);
    }
    battleRaf=requestAnimationFrame(frame);
  });
}

function runLeaf(battleNo,newIdx){
  const ov=$("#overlay");
  ov.innerHTML='<div class="panel"><h2>🍃 はっぱ早ぐい対決！</h2>'+
    '<div class="stage-box" id="btlBox">'+
      '<div class="runner" style="left:6%;bottom:4px;">'+miniMe("gLm",90)+'</div>'+

  const box=$("#btlBox");
  let me=0, riv=0, spawned=0, resolved=0;
  const TOTAL=12;
  countdown(box,()=>{
    function spawn(){
      spawned++;
      const leaf=document.createElement("div");
      leaf.className="leaf"; leaf.textContent="🍃";
      const x=8+Math.random()*76;
      leaf.style.left=x+"%"; leaf.style.top="-14%";
      box.appendChild(leaf);
      const t0=performance.now(), dur=2900+Math.random()*700;
      let eaten=false;
      leaf.addEventListener("pointerdown",()=>{
        if(eaten) return; eaten=true;
        me++; $("#cMe").textContent=me; SFX.yum();
        leaf.style.transform="scale(1.7)"; leaf.style.opacity="0"; leaf.textContent="😋";
        bTimeout(()=>leaf.remove(),200);
        resolved++; maybeEnd();
      });
      function fall(now){
        if(eaten) return;
        const p=(now-t0)/dur;
        if(p>=1){
          eaten=true; leaf.remove(); resolved++;
          if(Math.random()<0.55){ riv++; $("#cRiv").textContent=riv; speech(box,"72%","54%","むしゃむしゃ",900); SFX.tick(); }
          else speech(box,"72%","54%","zzz…（たべそこねた）",900);
          maybeEnd(); return;
        }
        leaf.style.top=(-14+p*92)+"%";
        battleTimers.push(setTimeout(()=>requestAnimationFrame(fall),16));
      }
      requestAnimationFrame(fall);
      if(spawned<TOTAL) bTimeout(spawn, 800+Math.random()*350);
    }
    function maybeEnd(){
      if(resolved>=TOTAL) bTimeout(()=>finishBattle(me>riv, battleNo, newIdx, "leaf"),600);
    }
    spawn();
  });
}

/* ---------- ジャンプ対決 ---------- */
function runJump(battleNo,newIdx){
  const ov=$("#overlay");
  ov.innerHTML='<div class="panel"><h2>🪨 ジャンプ対決！</h2>'+
    '<div class="stage-box" id="btlBox">'+
      '<div class="lane-line" style="top:46%"></div>'+

      '<div class="runner" id="jRiv" style="left:12%;top:56%;transition:transform .28s cubic-bezier(.3,1.4,.6,1);"><div class="run-anim">'+miniRiv("gJr",80)+'</div></div>'+
    '</div>'+
    '<div class="battle-hud"><span class="me">'+esc(pName())+'：<span id="cMe">0</span> かい</span><span class="riv">なつお：<span id="cRiv">0</span> かい</span></div>'+
    '<button class="big-btn blue" id="jumpBtn">ジャンプ！</button></div>';
  const box=$("#btlBox"), meEl=$("#jMe"), rivEl=$("#jRiv"), btn=$("#jumpBtn");
  let meAir=false, meClear=0, rivClear=0, wave=0;
  const WAVES=5;
  const rivFails=new Set(); while(rivFails.size<2) rivFails.add(1+Math.floor(Math.random()*WAVES));
  btn.addEventListener("pointerdown",()=>{
    if(meAir) return;
    meAir=true; SFX.jump();
    meEl.style.transform="translateY(-72px)";
    bTimeout(()=>{ meEl.style.transform="translateY(0)"; bTimeout(()=>meAir=false,220); },430);
  });
  countdown(box,()=>{
    function sendWave(){
      wave++;
      const w=wave;
      const rocks=[];
      [["18%","🪨"],["64%","🪨"]].forEach((lane,i)=>{
        const r=document.createElement("div");
        r.className="obstacle"; r.textContent=lane[1];
        r.style.top=lane[0]; r.style.left="100%";
        box.appendChild(r); rocks.push(r);
      });
      const t0=performance.now(), dur=2100;
      let judged=false, rivJumped=false;
      function move(now){
        const p=(now-t0)/dur;
        if(p>=1){ rocks.forEach(r=>r.remove());
          if(w<WAVES) bTimeout(sendWave,500);
          else bTimeout(()=>finishBattle(meClear>rivClear, battleNo, newIdx, "jump"),800);
          return;
        }
        const x=100-p*112;
        rocks.forEach(r=>r.style.left=x+"%");
        // なつおの自動ジャンプ（たまに寝ぼけて失敗）
        if(!rivJumped && x<30 && !rivFails.has(w)){
          rivJumped=true;
          rivEl.style.transform="translateY(-72px)";
          bTimeout(()=>rivEl.style.transform="translateY(0)",430);
        }
        // 判定（キャラ位置 12〜20% を通過する瞬間）
        if(!judged && x<=19 && x>=9){
          judged=true;
          if(meAir){ meClear++; $("#cMe").textContent=meClear; SFX.pop(); }
          else{ SFX.ouch(); meEl.style.filter="brightness(1.6)"; speech(box,"14%","2%","いたっ！",800); bTimeout(()=>meEl.style.filter="",400); }
          if(!rivFails.has(w)){ rivClear++; $("#cRiv").textContent=rivClear; }
          else{ speech(box,"14%","48%","ねぼけて つまずいた！",1200); rivEl.style.filter="brightness(1.6)"; bTimeout(()=>rivEl.style.filter="",400); }
        }
        battleTimers.push(setTimeout(()=>requestAnimationFrame(move),16));
      }
      requestAnimationFrame(move);
    }
    sendWave();
  });
}

/* ---------- じゃんけんカードバトル（てんとうむし→とかげ）
     カードは毎回3まいから すきに えらべる。あいこは やりなおし。2勝でクリア ---------- */
function runJanken(battleNo,newIdx){
  const ov=$("#overlay");
  const HANDS=["✊","✌️","✋"];
  let round=1, meW=0, rivW=0, locked=false;
  function beats(a,b){ return (a===0&&b===1)||(a===1&&b===2)||(a===2&&b===0); }
  function render(msg,reveal){
    ov.innerHTML='<div class="panel"><h2>✊ じゃんけんカードバトル！</h2>'+
      '<div class="battle-hud"><span class="me">'+esc(pName())+'：'+meW+'かち</span>'+
      '<span style="color:#8b95a0;">しょうぶ '+Math.min(round,3)+'/3（あいこは やりなおし）</span>'+
      '<span class="riv">なつお：'+rivW+'かち</span></div>'+
      '<div style="margin:8px 0;font-size:15.5px;font-weight:800;color:#5d6b78;min-height:24px;">'+msg+'</div>'+
      (reveal?'<div style="font-size:46px;margin:4px 0;">'+reveal+'</div>':"")+
      '<div style="font-size:14px;font-weight:800;color:#7b6cd9;">なつお「どれ だそうかな〜…」</div>'+
      '<div style="display:flex;gap:8px;justify-content:center;margin:6px 0 10px;">'+
        [0,1,2].map(()=>'<div style="width:56px;height:74px;background:linear-gradient(#9f8fef,#7b6cd9);border-radius:10px;'+
          'display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;font-weight:900;">？</div>').join("")+
      '</div>'+
      '<div style="font-size:14px;font-weight:800;color:#e2574c;">きみのカード（すきなのを タップ！）</div>'+
      '<div style="display:flex;gap:10px;justify-content:center;margin:8px 0;" id="jkMine">'+
        [0,1,2].map(c=>'<button data-c="'+c+'" style="width:68px;height:90px;font-size:36px;border:none;border-radius:12px;'+
          'background:#fff;box-shadow:0 4px 0 #d0dde5;cursor:pointer;">'+HANDS[c]+'</button>').join("")+
      '</div></div>';
    $("#jkMine").addEventListener("click",e=>{
      const b=e.target.closest("button"); if(!b||locked) return;
      locked=true;
      const mc=+b.dataset.c;
      const rc=Math.floor(Math.random()*3);
      const rv=HANDS[mc]+"　VS　"+HANDS[rc];
      let res;
      if(beats(mc,rc)){ meW++; res="きみの かち！🎉"; SFX.pop(); round++; }
      else if(beats(rc,mc)){ rivW++; res="なつおの かち…"; SFX.ouch(); round++; }
      else{ res="あいこ！もういっかい！"; SFX.tick(); }
      if(round>3 || meW>=2 || rivW>=2){
        render(res,rv);
        bTimeout(()=>finishBattle(meW>=2,battleNo,newIdx,"janken"),1600);
      }else{
        locked=false;
        render(res+"　つぎの カードを えらぼう！",rv);
      }
    });
  }
  render("すきな カードを えらんでね！さきに 2かい かったほうの しょうり！");
}

/* ---------- ばくだんどうかせん（とかげ→かめ）
     ほんもののあみだくじ。えらんだ線を 火が じりじり たどっていく ---------- */
function runFuse(battleNo,newIdx){
  const ov=$("#overlay");
  const X=[50,150,250,350], TOP=26, BOT=196;
  /* よこ線（あみだのはしご）をランダム生成 */
  const rungs=[];
  [54,82,110,138,166].forEach(y=>{
    const p=Math.floor(Math.random()*4);   // 0-2:よこ線あり 3:なし
    if(p<3) rungs.push({y:y,p:p});
  });
  if(rungs.length<2){ rungs.push({y:96,p:0},{y:124,p:2}); }
  rungs.sort((a,b)=>a.y-b.y);
  function pathFrom(c){
    const pts=[[X[c],TOP]];
    rungs.forEach(r=>{
      if(r.p===c){ pts.push([X[c],r.y]); c=c+1; pts.push([X[c],r.y]); }
      else if(r.p===c-1){ pts.push([X[c],r.y]); c=c-1; pts.push([X[c],r.y]); }
    });
    pts.push([X[c],BOT]);
    return {pts:pts,end:c};
  }
  const bombCol=Math.floor(Math.random()*4);
  const vLines=X.map(x=>'<line x1="'+x+'" y1="'+TOP+'" x2="'+x+'" y2="'+BOT+'" class="amida"/>').join("");
  const rungLines=rungs.map(r=>'<line x1="'+X[r.p]+'" y1="'+r.y+'" x2="'+X[r.p+1]+'" y2="'+r.y+'" class="amida"/>').join("");
  const boxes=X.map((x,i)=>'<text id="fzEnd'+i+'" x="'+x+'" y="'+(BOT+30)+'" font-size="26" text-anchor="middle">🎁</text>').join("");
  const tops=X.map((x,i)=>'<g class="fzTop" data-i="'+i+'" style="cursor:pointer;">'+
    '<circle cx="'+x+'" cy="'+(TOP-12)+'" r="13" fill="#ffefc2" stroke="#c98a1e" stroke-width="2"/>'+
    '<text x="'+x+'" y="'+(TOP-6)+'" font-size="14" text-anchor="middle" font-weight="900" fill="#c98a1e">'+(i+1)+'</text></g>').join("");
  ov.innerHTML='<div class="panel"><h2>💣 ばくだんどうかせん！</h2>'+
    '<div class="desc" id="fzMsg" style="font-weight:800;">すきな ばんごうを タップ！あみだくじの さきに ばくだんが 1つ…！</div>'+
    '<svg id="fzSvg" viewBox="0 0 400 240" style="width:min(440px,90vw);display:block;margin:0 auto;">'+
      '<style>.amida{stroke:#8a5a33;stroke-width:5;stroke-linecap:round;}</style>'+
      vLines+rungLines+boxes+tops+
      '<text id="fzFire" x="-60" y="-60" font-size="22" text-anchor="middle">🔥</text>'+
    '</svg>'+
    '<div style="display:flex;justify-content:center;gap:34px;align-items:flex-end;">'+
      '<div>'+miniMe("gFm2",60)+'<div style="font-weight:900;color:#e2574c;font-size:13px;">'+esc(pName())+'</div></div>'+
      '<div>'+miniRiv("gFr2",60)+'<div style="font-weight:900;color:#7b6cd9;font-size:13px;">なつお</div></div>'+
    '</div></div>';
  const svg=$("#fzSvg"), fire=$("#fzFire");
  const taken=[];
  let busyF=false;
  function trace(c,cb){
    const P=pathFrom(c), pts=P.pts;
    const segs=[]; let total=0;
    for(let i=1;i<pts.length;i++){ const L=Math.hypot(pts[i][0]-pts[i-1][0],pts[i][1]-pts[i-1][1]); segs.push(L); total+=L; }
    const dur=Math.max(2200, total/110*1000);   // じりじり ゆっくり
    const t0=performance.now();
    let lastTick=0;
    function step(now){
      let dist=Math.min(1,(now-t0)/dur)*total;
      if(now-lastTick>380){ lastTick=now; SFX.tick(); }   // ちりちり音
      let i=0;
      while(i<segs.length && dist>segs[i]){ dist-=segs[i]; i++; }
      if(i>=segs.length || (now-t0)>=dur){
        fire.setAttribute("x",pts[pts.length-1][0]); fire.setAttribute("y",pts[pts.length-1][1]);
        cb(P.end); return;
      }
      const a=pts[i], b=pts[i+1], f=segs[i]?dist/segs[i]:1;
      fire.setAttribute("x",a[0]+(b[0]-a[0])*f);
      fire.setAttribute("y",a[1]+(b[1]-a[1])*f);
      battleTimers.push(setTimeout(()=>requestAnimationFrame(step),16));
    }
    requestAnimationFrame(step);
  }
  function boom(col,winner){
    $("#fzEnd"+col).textContent="💥"; SFX.boom();
    $("#fzMsg").textContent = winner==="me"
      ? "ドッカーン！！なつおの みちが ばくだんだった！きみの かち！！"
      : "ドッカーン！！ばくだんに とうちゃく…！";
    bTimeout(()=>finishBattle(winner==="me",battleNo,newIdx,"fuse"),1500);
  }
  svg.addEventListener("click",e=>{
    const t=e.target.closest(".fzTop"); if(!t||busyF) return;
    const i=+t.dataset.i;
    if(taken.includes(i)) return;
    busyF=true; taken.push(i); t.setAttribute("opacity",".3");
    $("#fzMsg").textContent="ちりちりちり……🔥";
    trace(i,(end)=>{
      if(end===bombCol){ boom(end,"riv"); return; }
      $("#fzEnd"+end).textContent="🌻"; SFX.pop();
      $("#fzMsg").textContent="セーフ！つぎは なつおの ばん…";
      /* なつおは のこりから えらぶ（ばくだんへの みちを ひきやすい） */
      const remaining=[0,1,2,3].filter(x=>!taken.includes(x));
      const bombTop=remaining.find(x=>pathFrom(x).end===bombCol);
      const pick=(bombTop!==undefined && Math.random()<0.7)? bombTop : remaining[Math.floor(Math.random()*remaining.length)];
      taken.push(pick);
      bTimeout(()=>{
        svg.querySelector('.fzTop[data-i="'+pick+'"]').setAttribute("opacity",".3");
        $("#fzMsg").textContent='なつお「じゃあ ボクは '+(pick+1)+'ばん…」ちりちりちり……🔥';
        trace(pick,(e2)=>{
          if(e2===bombCol){ boom(e2,"me"); return; }
          $("#fzEnd"+e2).textContent="🌻"; SFX.tick();
          $("#fzMsg").textContent="なつおも セーフ…のこりの ばんごうから えらんで！";
          busyF=false;
        });
      },1200);
    });
  });
}

/* ---------- スイカ早ぐい対決（かめ→コーカサス） ---------- */
function runSuika(battleNo,newIdx){
  const ov=$("#overlay");
  ov.innerHTML='<div class="panel"><h2>🍉 スイカ早ぐい対決！</h2>'+
    '<div class="stage-box" id="btlBox">'+

      '<div style="position:absolute;left:56%;top:14%;font-weight:900;font-size:28px;color:#e2574c;" id="pc1">0%</div>'+
      '<div class="runner" style="left:4%;top:56%;">'+miniRiv("gSr",64)+'</div>'+
      '<div style="position:absolute;left:32%;top:54%;font-size:64px;transition:transform .2s;" id="wm2">🍉</div>'+
      '<div style="position:absolute;left:56%;top:62%;font-weight:900;font-size:28px;color:#7b6cd9;" id="pc2">0%</div>'+
    '</div>'+
    '<button class="big-btn" id="dashBtn" disabled style="opacity:.5">たべる！！（れんだ）</button></div>';
  const box=$("#btlBox"), btn=$("#dashBtn");
  let meP=0, rivP=0, meV=0, running=false, napping=false, ended=false;
  btn.addEventListener("pointerdown",()=>{
    if(!running) return;
    meV=Math.min(meV+15,46); SFX.yum();
  });
  countdown(box,()=>{
    running=true; btn.disabled=false; btn.style.opacity="1";
    let last=performance.now();
    bTimeout(()=>{ napping=true; speech(box,"20%","44%","おなか いっぱい…zzz",3200); },2800);
    bTimeout(()=>{ napping=false; speech(box,"20%","44%","はっ！まだ のこってる！",1400); },6300);
    function frame(now){
      if(ended) return;
      const dt=Math.min((now-last)/1000,0.05); last=now;
      meP+=meV*dt; meV*=Math.exp(-2.4*dt);
      rivP+=(napping?0:10)*dt;
      $("#pc1").textContent=Math.min(100,Math.floor(meP))+"%";
      $("#pc2").textContent=Math.min(100,Math.floor(rivP))+"%";
      $("#wm1").style.transform="scale("+Math.max(0.15,1-meP/100*0.85)+")";
      $("#wm2").style.transform="scale("+Math.max(0.15,1-rivP/100*0.85)+")";
      if(meP>=100||rivP>=100){
        ended=true; running=false;
        if(meP>=100) $("#wm1").textContent="😋";
        if(rivP>=100) $("#wm2").textContent="😋";
        finishBattle(meP>=100 && meP>=rivP, battleNo, newIdx, "suika");
        return;
      }
      battleRaf=requestAnimationFrame(frame);
    }
    battleRaf=requestAnimationFrame(frame);
  });
}

/* ---------- やきゅう対決（コーカサス→さいしゅうけいたい） ---------- */
function runBaseball(battleNo,newIdx){
  const ov=$("#overlay");
  ov.innerHTML='<div class="panel"><h2>⚾ やきゅう対決！</h2>'+
    '<div class="battle-hud"><span class="me">ヒット：<span id="bbHit">0</span> / 3</span>'+
    '<span style="color:#8b95a0;">のこり：<span id="bbLeft">6</span>きゅう</span></div>'+
    '<div class="stage-box" id="btlBox">'+
      '<div class="runner" style="right:5%;top:30%;">'+miniRiv("gBBr",76)+'</div>'+
      '<div class="runner" style="left:5%;bottom:6px;">'+miniMe("gBBm",80)+'</div>'+
      '<div id="hitZone" style="position:absolute;left:13%;top:46%;width:80px;height:80px;border:3px dashed rgba(255,255,255,.95);border-radius:50%;"></div>'+
      '<div id="ball" style="position:absolute;font-size:28px;display:none;z-index:5;">⚾</div>'+
    '</div>'+
    '<button class="big-btn" id="swingBtn">スイング！</button></div>';
  const box=$("#btlBox"), ball=$("#ball"), btn=$("#swingBtn"), zone=$("#hitZone");
  let hits=0, left=6, ballP=-1, active=false, over=false;
  /* ボールが 点線のまるの中に入っていたら ヒット（少しはみ出てもOKの甘め判定） */
  function inZone(){
    const b=ball.getBoundingClientRect(), z=zone.getBoundingClientRect();
    if(!z.width || !b.width) return ballP>0.62 && ballP<1.0;   // 環境フォールバック
    const bx=b.left+b.width/2, by=b.top+b.height/2;
    const zx=z.left+z.width/2, zy=z.top+z.height/2;
    return Math.hypot(bx-zx, by-zy) <= z.width/2 + b.width/2;
  }
  function endCheck(){
    if(over) return true;
    if(hits>=3){ over=true; bTimeout(()=>finishBattle(true,battleNo,newIdx,"baseball"),800); return true; }
    if(left<=0){ over=true; bTimeout(()=>finishBattle(false,battleNo,newIdx,"baseball"),800); return true; }
    return false;
  }
  function pitch(){
    if(endCheck()) return;
    left--; $("#bbLeft").textContent=left;
    speech(box,"64%","20%","いくよ〜！",800);
    bTimeout(()=>{
      active=true;
      const t0=performance.now(), dur=1750+Math.random()*450;   // すこしゆっくり
      ball.style.display="block";
      function fly(now){
        if(!active) return;
        const p=(now-t0)/dur;
        if(p>=1){
          active=false; ball.style.display="none"; ballP=-1;
          speech(box,"18%","38%","みのがし！",800); SFX.tick();
          bTimeout(pitch,1000); return;
        }
        ballP=p;
        ball.style.left=(76-p*60)+"%";
        ball.style.top=(36+p*20)+"%";
        battleTimers.push(setTimeout(()=>requestAnimationFrame(fly),16));
      }
      requestAnimationFrame(fly);
    },900);
  }
  btn.addEventListener("pointerdown",()=>{
    if(over) return;
    if(!active){ SFX.tick(); return; }
    SFX.jump();
    if(inZone()){
      active=false; hits++; $("#bbHit").textContent=hits;
      ball.style.transition="left .7s ease-out, top .7s ease-out";
      ball.style.left="92%"; ball.style.top="2%";
      speech(box,"18%","36%","カキーン！！⚾✨",1100); SFX.go(); confetti(20);
      bTimeout(()=>{ ball.style.transition=""; ball.style.display="none"; pitch(); },1000);
    }else{
      active=false; ball.style.display="none";
      speech(box,"18%","38%","ブンッ…はやすぎ！",900); SFX.ouch();
      bTimeout(pitch,1000);
    }
  });
  countdown(box,pitch);
}

  let meAir=false, meClear=0, rivClear=0, wave=0;
  const WAVES=5;
  const rivFails=new Set(); while(rivFails.size<2) rivFails.add(1+Math.floor(Math.random()*WAVES));
  btn.addEventListener("pointerdown",()=>{
    if(meAir) return;
    meAir=true; SFX.jump();
    meEl.style.transform="translateY(-72px)";
    bTimeout(()=>{ meEl.style.transform="translateY(0)"; bTimeout(()=>meAir=false,220); },430);
  });
  countdown(box,()=>{
    function sendWave(){
      wave++;
      const w=wave;
      const rings=[];
      [["12%"],["58%"]].forEach(lane=>{
        const r=document.createElement("div");
        r.className="obstacle"; r.textContent="🔵"; r.style.fontSize="46px";
        r.style.top=lane[0]; r.style.left="100%";
        box.appendChild(r); rings.push(r);
      });
      const t0=performance.now(), dur=2100;
      let judged=false, rivJumped=false;
      function move(now){
        const p=(now-t0)/dur;
        if(p>=1){ rings.forEach(r=>r.remove());
          if(w<WAVES) bTimeout(sendWave,500);
          else bTimeout(()=>finishBattle(meClear>rivClear, battleNo, newIdx, "hoop"),800);
          return;
        }
        const x=100-p*112;
        rings.forEach(r=>r.style.left=x+"%");
        if(!rivJumped && x<30 && !rivFails.has(w)){
          rivJumped=true;
          rivEl.style.transform="translateY(-72px)";
          bTimeout(()=>rivEl.style.transform="translateY(0)",430);
        }
        if(!judged && x<=19 && x>=9){
          judged=true;
          if(meAir){ meClear++; $("#cMe").textContent=meClear; SFX.pop(); speech(box,"14%","2%","スポッ！",700); }
          else{ SFX.ouch(); meEl.style.filter="brightness(1.6)"; speech(box,"14%","2%","わっかに ぶつかった！",800); bTimeout(()=>meEl.style.filter="",400); }
          if(!rivFails.has(w)){ rivClear++; $("#cRiv").textContent=rivClear; }
          else{ speech(box,"14%","48%","ねぼけて どぼん！",1200); rivEl.style.filter="brightness(1.6)"; bTimeout(()=>rivEl.style.filter="",400); }
        }
        battleTimers.push(setTimeout(()=>requestAnimationFrame(move),16));
      }
      requestAnimationFrame(move);
    }
    sendWave();
  });
}

/* ---------- かざんよそうバトル（ティラノ→ヘラクレス） ---------- */

      picked=true;
      const mi=+b.dataset.i;
      b.querySelector(".vc-mark").style.visibility="visible"; SFX.tick();
      const rest=[0,1,2].filter(x=>x!==mi);
      const ri=rest[Math.floor(Math.random()*rest.length)];
      const rb=row.querySelector('button[data-i="'+ri+'"]');
      rb.querySelector(".vc-mark").textContent="🍃";
      rb.querySelector(".vc-mark").style.visibility="visible";
      $("#vcMsg").textContent='なつお「ボクは '+(ri+1)+'ばんの かざんに する…」';
      bTimeout(()=>{
        /* どれが噴火するか：50%きみ / 25%なつお / 25%どれでもない */
        const r=Math.random();
        const erupt = r<0.5 ? mi : r<0.75 ? ri : [0,1,2].find(x=>x!==mi&&x!==ri);
        $("#vcMsg").textContent="ゴゴゴゴゴ……！！";
        [...row.querySelectorAll("button")].forEach(x=>x.classList.add("evo-shake"));
        SFX.ouch();
        bTimeout(()=>{
          [...row.querySelectorAll("button")].forEach(x=>x.classList.remove("evo-shake"));
          const eb=row.querySelector('button[data-i="'+erupt+'"]');
          eb.textContent="💥"; eb.style.fontSize="70px"; SFX.boom(); confetti(30);
          if(erupt===mi){
            $("#vcMsg").textContent="だいふんか！！みごと てきちゅう！！🎉";
            bTimeout(()=>finishBattle(true,battleNo,newIdx,"volcano"),1500);
          }else if(erupt===ri){
            $("#vcMsg").textContent="なつおの かざんが ふんか…！なつおの かち…";
            bTimeout(()=>finishBattle(false,battleNo,newIdx,"volcano"),1500);
          }else{
            $("#vcMsg").textContent="どっちも はずれ！もういっかい しょうぶ！";
            bTimeout(playRound,1700);
          }
        },1900);
      },1200);
    });
  }
  playRound();
}

/* ---------- 勝敗 ---------- */
function finishBattle(win, battleNo, newIdx, type){
  clearBattle();
  const ov=$("#overlay");
  if(win){
    const rev=(battleNo===1 && revenge);
    const bonus=(newIdx==null);
    S.score.me++; save(); SFX.win(); confetti(80);
    ov.innerHTML='<div class="panel"><h2 style="font-size:34px;">'+(bonus?"🎪 ボーナスバトル せいしょう！！":rev?"🔥 リベンジ せいこう！！":"🏆 きみの かち！！")+'</h2>'+
      '<div style="font-size:60px; margin:6px 0;">🎉😆🎉</div>'+
      '<div class="desc">'+(bonus
        ?'なつお「やっぱり つよいなあ…ボクは ひるねに もどる…」<br>スコアが ふえた！つぎの ボーナスバトルも おたのしみに！'
        :rev
        ?'なつお「ええーっ！？ さっきの ほんきは どこに…zzz」<br>やったね！しょうりの ちからで しんかが はじまる！！'
        :'なつお「つ、つよすぎる…！ ボクは ねる…」<br>しょうりの ちからで しんかが はじまる！！')+'</div>'+
      '<button class="big-btn" id="nextBtn">'+(bonus?"やったー！":"しんかへ！")+'</button></div>';
    $("#nextBtn").addEventListener("click",()=>{
      revenge=false;
      if(bonus){ bonusMode=false; ov.classList.add("hidden"); ov.innerHTML=""; busy=false; renderBars(); renderScene(); setTimeout(checkFinale,500); }
      else{ renderBars(); showEvolution(newIdx); }
    });
  }else if(battleNo===1 && !revenge){
    S.score.riv++; save(); SFX.lose();
    ov.innerHTML='<div class="panel"><h2 style="color:#7b6cd9;">😲 なつおの かち…！</h2>'+
      '<div style="font-size:60px; margin:6px 0;">😪🏅</div>'+
      '<div class="desc">なつお「やるときは やるんだよ〜。じゃ、おやすみ…zzz」<br>くやしい〜！！ このまま ねかせて おくもんか！</div>'+
      '<button class="big-btn" id="revBtn">🔥 リベンジだ！！</button>'+
      '<button class="big-btn blue" id="nextBtn">くやしいけど つぎへ</button></div>';
    $("#revBtn").addEventListener("click",()=>{ revenge=true; SFX.go(); showBattleIntro(type, battleNo, newIdx); });
    $("#nextBtn").addEventListener("click",()=>{ renderBars(); showEvolution(newIdx); });
  }else{
    SFX.lose();
    const bonus=(newIdx==null);
    const canSkip=(battleNo===1 || bonus);   // リベンジ失敗でも進化はできる／ボーナスは負けてもOK
    if(bonus){ S.score.riv++; save(); }
    ov.innerHTML='<div class="panel"><h2 style="color:#4aa3ff;">おしい〜！！</h2>'+
      '<div style="font-size:56px; margin:6px 0;">💦🐛💦</div>'+
      '<div class="desc">'+(bonus
        ?'なつお「えへへ、たまには かつよ〜」<br>くやしかったら もういっかい！（つぎの ボーナスバトルでも OK）'
        :'あとちょっとだった！ もういちど ちょうせんだ！<br>（なつおは まちくたびれて あくびしてる…いまが チャンス！）')+'</div>'+
      '<button class="big-btn" id="retryBtn">もういちど！</button>'+
      (canSkip?'<button class="big-btn blue" id="skipBtn">つぎへ</button>':"")+'</div>';
    $("#retryBtn").addEventListener("click",()=>showBattleIntro(type, battleNo, newIdx));
    if(canSkip) $("#skipBtn").addEventListener("click",()=>{
      revenge=false;
      if(bonus){ bonusMode=false; ov.classList.add("hidden"); ov.innerHTML=""; busy=false; renderBars(); renderScene(); setTimeout(checkFinale,500); }
      else{ renderBars(); showEvolution(newIdx); }
    });
  }
}

/* ================= グランドフィナーレ：はなびたいかい ================= */
function runFinale(){
  const ov=$("#overlay"); ov.classList.remove("hidden");
  let stars="";
  for(let i=0;i<24;i++){
    stars+='<div class="fw-star" style="left:'+(Math.random()*96)+'%;top:'+(Math.random()*55)+'%;animation-delay:'+(Math.random()*2)+'s">✦</div>';
  }
  ov.innerHTML='<div class="panel"><h2>🎆 なつまつり だーー！！</h2>'+
    '<div class="desc">さいきょうキング ＆ しゅくだいコンプリートの おいわいだ！<br>'+
    '<b>よぞらを タップ</b>して はなびを うちあげよう！（あと <span id="fwLeft" style="color:#ff7043;font-size:19px;">10</span> はつ）</div>'+
    '<div class="stage-box night" id="fwBox">'+stars+
      '<div class="runner" style="left:16%;bottom:2px;">'+miniMe("gFm",84)+'</div>'+
      '<div class="runner" style="right:16%;bottom:2px;">'+miniRiv("gFr",84)+'</div>'+
    '</div></div>';
  const box=$("#fwBox");
  let left=10, finished=false;
  function burst(x,y,big){
    const colors=["#ff6b81","#ffd93d","#5f7cff","#ff9f43","#4dd0e1","#9c6ade","#7bc86c","#ff8fab","#ffffff"];
    const n=big?28:16;
    for(let i=0;i<n;i++){
      const p=document.createElement("div"); p.className="fw-p";
      p.style.left=x+"px"; p.style.top=y+"px";
      p.style.background=colors[Math.floor(Math.random()*colors.length)];
      box.appendChild(p);
      const ang=Math.PI*2*i/n + Math.random()*0.3;
      const r=(big?100:62)+Math.random()*30;
      requestAnimationFrame(()=>{
        p.style.transform="translate("+(Math.cos(ang)*r)+"px,"+(Math.sin(ang)*r+24)+"px) scale(.3)";
        p.style.opacity="0";
      });
      setTimeout(()=>p.remove(),1200);
    }
    SFX.boom();
  }
  box.addEventListener("pointerdown",e=>{
    if(finished||left<=0) return;
    const r=box.getBoundingClientRect();
    const x=Math.max(20,Math.min(r.width-20, e.clientX-r.left));
    const y=Math.max(24,Math.min(r.height*0.6, e.clientY-r.top));
    const rk=document.createElement("div"); rk.className="fw-rocket";
    rk.style.left=x+"px"; box.appendChild(rk);
    SFX.whistle();
    requestAnimationFrame(()=>{ rk.style.transform="translateY("+(y-r.height)+"px)"; });
    setTimeout(()=>{ rk.remove(); burst(x,y,false); },520);
    left--; $("#fwLeft").textContent=left;
    if(left===0){
      finished=true;
      setTimeout(()=>{
        for(let i=0;i<7;i++){
          setTimeout(()=>burst(50+Math.random()*(r.width-100), 30+Math.random()*130, true), i*380);
        }
        setTimeout(()=>{
          const msg=document.createElement("div");
          msg.className="fw-msg";
          msg.innerHTML="たのしかったね！<br>まだまだ なつのあそびを<br>いっぱい たのしもう！🌻<br>"+
            '<span style="font-size:17px;display:inline-block;margin-top:10px;background:rgba(255,255,255,.15);border-radius:12px;padding:8px 14px;">'+
            "💌『たくさん あそんでくれて ありがとう、<br>たのしかったよ。 なつおより』</span>";
          box.appendChild(msg);
          SFX.fanfare(); confetti(120);
          const btn=document.createElement("button");
          btn.className="big-btn"; btn.textContent="おわり";
          ov.querySelector(".panel").appendChild(btn);
          btn.addEventListener("click",()=>{
            S.finaleDone=true; save();
            ov.classList.add("hidden"); ov.innerHTML=""; busy=false; renderScene();
          });
        },3000);
      },700);
    }
  });
}

    const id="p"+Date.now().toString(36);
    PROFILES.list.push({id:id, name:nm.trim().slice(0,10)});
    PROFILES.activeId=id;
    saveProfiles(); location.reload();   // 新プレイヤーはまっさらな状態でスタート
  });
  $("#setupSave").addEventListener("click",()=>{
    S.tasksDef=[...ov.querySelectorAll("#setDaily .setup-row")].map((r,i)=>({
      id:r.dataset.id,
      name:(r.querySelector(".nm").value.trim()||"タスク"+(i+1)).slice(0,30),
      emoji:r.querySelector(".emoji-pick").textContent
    }));
    S.hwDef=[...ov.querySelectorAll("#setHw .setup-row")].map((r,i)=>{
      const mode=r.dataset.mode||"count";
      let mx, un;
      if(mode==="inf"){ mx=0; un=(r.querySelector(".un").value.trim()||"かい").slice(0,4); }
      else if(mode==="rough"){ mx=10; un="めもり"; }
      else{ mx=Math.min(999,Math.max(1,parseInt(r.querySelector(".mx").value,10)||1)); un=(r.querySelector(".un").value.trim()||"かい").slice(0,4); }
      return {
        id:r.dataset.id,
        name:(r.querySelector(".nm").value.trim()||"しゅくだい"+(i+1)).slice(0,30),
        emoji:r.querySelector(".emoji-pick").textContent,
        max:mx, unit:un, btn:"+1"+un, mode:mode
      };
    });
    S.hwDef.forEach(h=>{ if(S.hw[h.id]==null) S.hw[h.id]=0; });
    /* なつやすみの きかん */
    const vs=$("#vacStartIn").value, ve=$("#vacEndIn").value;
    if(/^\d{4}-\d{2}-\d{2}$/.test(vs)) S.vacStart=vs;
    if(/^\d{4}-\d{2}-\d{2}$/.test(ve)) S.vacEnd=ve;
    if(parseYMD(S.vacEnd)<parseYMD(S.vacStart)) S.vacEnd=S.vacStart;
    const nm=$("#pNameIn").value.trim();
    if(nm) activeProfile().name=nm.slice(0,10);
    saveProfiles();
    S.setupDone=true; save();
    computeStages();   // タスク量にあわせて進化ペースを再計算
    renderTasks(); renderCalendar(); renderBars(); renderScene(); SFX.pop(); closeEmojiPalette();
    ov.classList.add("hidden"); ov.innerHTML="";
    if(first) setTimeout(()=>toast("🥚 タスクをやって たまごを そだてよう！",3000),400);
  });
}
$("#setupBtn").addEventListener("click",()=>{
  if(busy || !$("#overlay").classList.contains("hidden")) return;
  showSetup(false);
});
